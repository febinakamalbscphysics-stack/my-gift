<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In this beautiful wedding anniversary will papa and ummachi will say "febi you should go to antartica"☃️</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe6e6; /* baby blue background */
            font-family: 'Arial', sans-serif;
            text-align: center;
            overflow: hidden; /* Prevents scrollbars when button moves */
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        h1 { color: #89CFF0; }

        img {
            width: 200px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        button {
            padding: 10px 25px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yesBtn {
            background-color:  #89CFF0;
            color: white;
        }

        #noBtn {
            background-color: #6c757d;
            color: white;
            position: relative; /* Needed for JS movement */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>In this beautiful wedding anniversary will papa and ummachi will say "febi you should go to antartica"☃️</h1>
       
        
        <div class="buttons">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');

        // Function to move the button away
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });

        // What happens when they finally click "Yes"
        yesBtn.addEventListener('click', () => {
            document.querySelector('.container').innerHTML = `
                <h1>hurray!!💥🫵🏻🥳🥳💖WORLDS BEST PAPA AND UMMACHI👑</h1>
                <img src="pu.jpg">
            `;
        });
    </script>

</body>
</html>
